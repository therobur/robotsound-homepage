  var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  var pick = 'en';
  var primary = nav.split('-')[0];
  // direct full match
  if (langs.indexOf(nav) >= 0) pick = nav;

  // primary code match
  else if (langs.indexOf(primary) >= 0) pick = primary;
  window.location.replace('/' + pick + '/');
})();
</script>
